<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliquary — Вход</title>
    <link rel="icon" href="img/logo icon.png" type="image/png">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <a href="index.html"><img src="img/lo.png" alt="logo" height="60"></a>
            </div>
            <input type="checkbox" id="burger" class="burger-checkbox">
        <label for="burger" class="burger-menu">
            <span class="burger-icon"></span>
        </label>
            <nav class="nav">
                <a href="index.html">ГЛАВНАЯ</a>
                <a href="catalog.html">КАТАЛОГ</a>
                <a href="about.html">О НАС</a>
                <a href="contacts.html">КОНТАКТЫ</a>
                <a href="cart.html">КОРЗИНА</a>
                <a href="login.html">ПРОФИЛЬ</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="login-wrap">
            <div class="login-card" id="step-phone">
                <h2>Вход в личный кабинет</h2>
                <p class="login-sub">Введите номер телефона — мы отправим код подтверждения</p>
                <div class="form-group">
                    <label class="form-label">Номер телефона</label>
                    <input type="tel" id="phone-input" placeholder="+7 (___) ___-__-__" maxlength="18">
                </div>
                <button class="btn-main" id="btn-send-code">Получить код</button>
                <p class="login-note">Впервые? Аккаунт создастся автоматически</p>
            </div>
            <div class="login-card" id="step-code" style="display:none;">
                <h2>Введите код</h2>
                <p class="login-sub">Код отправлен на номер <span id="phone-display"></span></p>
                <div class="code-inputs">
                    <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
                    <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
                    <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
                    <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
                </div>
                <p class="code-error" id="code-error" style="display:none;">Неверный код. Попробуйте ещё раз</p>
                <button class="btn-main" id="btn-confirm">Войти</button>
                <button class="btn-back" id="btn-back">← Изменить номер</button>
            </div>

        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <span>Site Designed By: <a href="https://t.me/khempl">khempl</a></span>
                <span>&copy; 2020-2026</span>
            </div>
            <div class="footer-social">
                <a href="https://t.me/khempl"><img src="img/tg.png" alt="Telegram" width="30" height="30"></a>
                <span class="footer-sep">|</span>
                <a href="https://vk.com/khempl"><img src="img/vk.png" alt="VK" width="30" height="30"></a>
            </div>
        </div>
    </footer>
    <script src="js/profile.js"></script>
    <script src="js/stars.js"></script>

</body>
</html>
